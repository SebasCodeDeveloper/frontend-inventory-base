<!-- User Management -->
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-dark fw-bold mb-0" style="letter-spacing: -1px;">
      Gestión de Usuarios <i class="bi bi-person-badge ms-2" style="color: #060707;"></i>
    </h2>

    <!-- Botones de acción -->
    <div class="d-flex gap-2">
      <button class="btn btn-light d-flex align-items-center shadow-sm rounded-pill px-3" (click)="cargarUsuarios()"
        style="border: 1px solid #ddd;">
        <i class="bi bi-arrow-clockwise me-1"></i> Refrescar
      </button>
      <button class="btn btn-dark d-flex align-items-center shadow-sm rounded-pill px-3" data-bs-toggle="modal"
        data-bs-target="#userModal" (click)="usuarioSeleccionado = null">
        <i class="bi bi-plus-lg me-1"></i> New User
      </button>
    </div>
  </div>

  <!-- Sección de mensajes de error y carga -->
  <div *ngIf="errorMessage" class="alert border-0 shadow-sm mb-4" role="alert"
    style="background: rgba(255, 59, 48, 0.1); color: #ff3b30; border-radius: 12px;">
    <strong><i class="bi bi-exclamation-circle-fill"></i> Error:</strong> {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = null"></button>
  </div>
  <!-- Indicador de carga -->
  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-dark" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-2 text-muted">Consultando base de datos...</p>
  </div>

  <!-- Tabla de usuarios -->
  <div *ngIf="!isLoading" class="card mac-table-container shadow-sm border-0">
    <div class="mac-header d-flex align-items-center pe-3 ps-2">
      <span class="ms-1 small fw-medium text-muted" style="font-size: 0.75rem;">User Database</span>
    </div>

    <!-- Tabla responsive -->
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th class="ps-4">Nombre</th>
            <th>Email</th>
            <th>Edad</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of listaUsuarios">
            <td class="ps-4">
              <div class="fw-semibold text-dark">{{ user.name }}</div>
            </td>
            <td class="text-secondary">{{ user.email }}</td>
            <td>
              <span class="badge rounded-pill px-3"
                style="background: rgba(0, 122, 255, 0.1); color: #007aff; font-weight: 600;">
                {{ user.age }} años
              </span>
            </td>
            <td class="text-center">

              <!-- Botones de acción para cada usuario -->
              <div class="d-flex justify-content-center gap-2">
                <button class="btn-cool edit" (click)="usuarioSeleccionado = user" data-bs-toggle="modal"
                  data-bs-target="#userModal">
                  <div class="icon-blob">
                    <i class="bi bi-cpu"></i>
                  </div>
                </button>
                <button class="btn-cool delete" (click)="eliminarUsuario(user.id)">
                  <div class="icon-blob">
                    <i class="bi bi-fire"></i>
                  </div>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<!-- Modal para agregar/editar usuario -->
<div class="modal fade" id="userModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
  aria-labelledby="userModalLabel">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 bg-transparent">
      <div class="modal-body p-0">
        <app-dynamic-form [title]="'User'" [modalId]="'userModal'" [fields]="userFields"
          [dataToEdit]="usuarioSeleccionado" [saveAction]="saveUserAction" (operationSuccess)="onUserOperationSuccess()"
          (onCancel)="usuarioSeleccionado = null">
        </app-dynamic-form>
      </div>
    </div>
  </div>
</div>
