<!-- Modal de notificación -->
<div class="modal fade" id="notificationModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered shadow-mac">
        <div class="modal-content mac-glass border-0"
            style="border-radius: 24px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);">
            <div class="modal-body p-4 text-center">

                <!-- Vista de texto  del modal -->
                <div class="icon-wrapper mb-3">
                    <!-- icono de modal -->
                    <i [ngClass]="notify.modalIcon" class="display-4"
                        style="filter: drop-shadow(0 4px 8px rgb(0, 0, 0));"></i>
                </div>
                <!-- Titulo de modal -->
                <h5 class="fw-semibold text-dark mb-1 tracking-tight" style="color: #000000; opacity: 1;">
                    {{ notify.modalTitle }}
                </h5>
                <!-- Mesaje de modal -->
                <p class="small mb-4 fw-medium" style="color: #171616ac; opacity: 1;">
                    {{ notify.modalMessage }}
                </p>
                <!-- Boton para acceptar la notificación -->
                <button type="button" class="btn btn-dark w-100 rounded-pill py-2 fw-semibold shadow-sm"
                    data-bs-dismiss="modal" style="color: #e6e6e6; opacity: 1;">
                    Aceptar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal de confirmación de eliminación -->
<div class="modal fade" id="deleteConfirmModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg"
            style="border-radius: 24px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);">
            <div class="modal-body p-4 text-center" *ngIf="notify.confirmType">

                <ng-container *ngIf="notify.confirmType === 'delete'">
                    <div class="mb-3">
                        <i class="bi bi-exclamation-circle-fill text-danger" style="font-size: 3.5rem;"></i>
                    </div>
                    <!-- Vista de texto  para eliminar -->
                    <h4 class="fw-bold text-dark">¿Eliminar registro?</h4>
                    <p class="text-muted small">El registro será eliminado permanentemente del sistema.</p>


                    <div class="d-flex gap-2 mt-4">
                        <!-- Boton para cancelar la eminacion  -->
                        <button type="button" class="btn btn-light w-100 rounded-pill fw-semibold border"
                            data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <!-- Boton para eliminar -->
                        <button type="button" class="btn w-100 rounded-pill fw-semibold shadow-sm btn-mac-danger"
                            (click)="notify.executeConfirmation()">
                            Eliminar
                        </button>
                    </div>
                </ng-container>

                <!-- Vista de texto  para cancelar orden -->
                <ng-container *ngIf="notify.confirmType === 'cancel'">
                    <div class="mb-3">
                        <i class="bi bi-x-circle-fill" style="font-size: 3.5rem; color: #7239db;"></i>
                    </div>

                    <!-- Vista de texto  para cancelar orden -->
                    <h4 class="fw-bold text-dark">¿Cancelar Orden?</h4>
                    <p class="text-muted small">La orden se marcará como cancelada y no podrá ser procesada.</p>

                    <!-- Botones para cancelar o confirmar la cancelación de la orden -->
                    <div class="d-flex gap-2 mt-4">
                        <button type="button" class="btn btn-light w-100 rounded-pill fw-semibold border"
                            data-bs-dismiss="modal">
                            Volver
                        </button>

                        <!-- Boton para confirmar la cancelación de la orden -->
                        <button type="button" class="btn w-100 rounded-pill fw-semibold shadow-sm btn-mac-purple"
                            (click)="notify.executeConfirmation()">
                            Confirmar
                        </button>
                    </div>
                </ng-container>

                <ng-container *ngIf="notify.confirmType === 'pay'">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 3.5rem;"></i>
                    <h4 class="fw-bold mt-3">¿Procesar Pago?</h4>
                    <p class="text-muted small">Se registrará la transacción de forma permanente.</p>
                    <div class="d-flex gap-2 mt-4">
                        <button type="button" class="btn btn-light w-100 rounded-pill fw-semibold border"
                            data-bs-dismiss="modal">
                            Volver
                        </button>

                        <!-- Boton para confirmar el pago de la  orden-->
                        <button class="btn w-100 rounded-pill fw-semibold shadow-sm btn-mac-success"
                            (click)="notify.executeConfirmation()">Pagar Ahora</button>
                    </div>
                </ng-container>
            </div>
        </div>
    </div>
</div>
