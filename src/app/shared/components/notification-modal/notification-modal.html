<!-- Modal de notificación -->
<div class="modal fade" id="notificationModal" tabindex="-1" >
    <div class="modal-dialog modal-sm modal-dialog-centered shadow-mac">
        <div class="modal-content mac-glass border-0" style="border-radius: 24px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);">
            <div class="modal-body p-4 text-center">
                <div class="icon-wrapper mb-3">
                    <i [ngClass]="notify.modalIcon" class="display-4" style="filter: drop-shadow(0 4px 8px rgb(0, 0, 0));"></i>
                </div>
                <h5 class="fw-semibold text-dark mb-1 tracking-tight" style="color: #000000; opacity: 1;"> 
                    {{ notify.modalTitle }}
                </h5>

                <p class="small mb-4 fw-medium" style="color: #171616ac; opacity: 1;">
                    {{ notify.modalMessage }}
                </p>

                <button type="button" class="btn btn-dark w-100 rounded-pill py-2 fw-semibold shadow-sm" data-bs-dismiss="modal" style="color: #e6e6e6; opacity: 1;">
                    Aceptar
                </button>
            </div>
        </div>
    </div>
</div>
<!-- Modal de confirmación de eliminación -->
<div class="modal fade" id="deleteConfirmModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 24px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);">
            <div class="modal-body p-4 text-center">
                <div class="mb-3">
                    <i class="bi bi-exclamation-circle-fill text-danger" style="font-size: 3.5rem;"></i>
                </div>
                
                <h4 class="fw-bold text-dark">¿Eliminar registro?</h4>
                <p class="text-muted small">Esta acción no se puede deshacer. El registro será purgado permanentemente del sistema.</p>
                
                <div class="d-flex gap-2 mt-4">
                    <button type="button" class="btn btn-light w-100 rounded-pill fw-semibold border" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    
                    <button type="button" class="btn btn-danger w-100 rounded-pill fw-semibold shadow-sm" (click)="notify.executeConfirmation()">
                        Eliminar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
