<!-- Componente de paginación reutilizable -->
<div class="d-flex justify-content-between align-items-center px-4 py-2 bg-light border-top mt-auto">
  <div class="text-muted small fw-medium">
    Página {{ paginaActual }} de {{ totalPaginas }}
  </div>
  <!-- Controles de paginación -->
  <div class="pagination-controls d-flex gap-2">
    <button class="btn btn-sm btn-light rounded-pill px-3 shadow-sm border" [disabled]="paginaActual === 1"
      (click)="cambiarPagina(paginaActual - 1)">
      <i class="bi bi-chevron-left me-1"></i> Anterior
    </button>
    <!-- Botón para ir a la página siguiente -->
    <button class="btn btn-sm btn-light rounded-pill px-3 shadow-sm border"
      [disabled]="paginaActual === totalPaginas || totalPaginas === 0" (click)="cambiarPagina(paginaActual + 1)">
      Siguiente <i class="bi bi-chevron-right ms-1"></i>
    </button>
  </div>
</div>
