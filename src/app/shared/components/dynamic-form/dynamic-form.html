<div class="blueprint-bg"></div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="glass-form">
<!-- Título dinámico basado en el modo (crear o editar) -->
  <div class="text-center mb-4">
    <h3 class="fw-bold text-dark mb-0 uppercase">
      {{ isEditMode ? 'Modify ' + title : 'Create ' + title }}
    </h3>
    <p class="text-muted small">
      {{ isEditMode ? 'Edit existing record' : 'Create a new entry' }}
    </p>
  </div>
<!-- Contenedor de errores del servidor -->
  <div *ngIf="backendErrors.length > 0" class="mb-3 server-errors-container">
    <div *ngFor="let error of backendErrors" class="mac-error-text server-error">
      <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
    </div>
  </div>
<!-- Generación dinámica de campos del formulario -->
  <div *ngFor="let field of fields" class="mb-3">
    <label class="mac-label" [class.text-mac-blue]="form.get(field.name)?.invalid && form.get(field.name)?.touched">
      {{ field.label }}
    </label>
    
    <input 
      [type]="field.type" 
      [formControlName]="field.name" 
      class="mac-input shadow-sm"
      [class.w-50]="field.type === 'number'"
      [class.is-invalid-mac]="form.get(field.name)?.invalid && form.get(field.name)?.touched"
      [placeholder]="field.placeholder || ''">

<!-- Mensajes de error específicos para cada campo -->
    <div class="mac-error-text" *ngIf="form.get(field.name)?.invalid && form.get(field.name)?.touched">
      <i class="bi bi-info-circle-fill"></i> 
      <span *ngIf="form.get(field.name)?.errors?.['required']">Este campo es requerido.</span>
      <span *ngIf="form.get(field.name)?.errors?.['email']">Formato de correo inválido.</span>
      <span *ngIf="form.get(field.name)?.errors?.['minlength']">No cumple el mínimo de caracteres.</span>
    </div>
  </div>
  
<!-- Botones de acción -->
  <div class="d-flex justify-content-end gap-3 pt-3 border-top border-light">
    <button type="button" id="closeModalBtn" class="btn-mac-secondary" data-bs-dismiss="modal">
      Cancelar
    </button>
    <button type="submit" class="btn-mac-primary shadow" [disabled]="form.invalid">
      <i class="bi" [ngClass]="isEditMode ? 'bi-save' : 'bi-plus-circle-fill'"></i>
      {{ isEditMode ? ' Guardar Cambios' : ' Create ' + title }}
    </button> 
  </div>
</form>
