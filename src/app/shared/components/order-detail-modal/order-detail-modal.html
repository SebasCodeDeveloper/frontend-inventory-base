<div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 24px; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px);">
      
      <div class="modal-body p-4" *ngIf="orden">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold mb-0">Resumen de Orden</h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        
        <div class="bg-light p-3 rounded-4 mb-4" style="border: 1px solid rgba(0,0,0,0.05);">
          <div *ngFor="let item of orden.items" class="d-flex justify-content-between mb-2">
            <span class="text-secondary small">{{ item.quantity }}x {{ item.productName }}</span>
            <span class="fw-bold small">$ {{ item.subtotal | number:'1.2-2' }}</span>
          </div>
          <hr class="my-2 opacity-25">
          <div class="d-flex justify-content-between">
            <span class="fw-bold">Total</span>
            <span class="fw-bold text-primary" style="font-size: 1.1rem;">$ {{ orden.total | number:'1.2-2' }}</span>
          </div>
        </div>

        <div class="d-grid gap-2">
          <button *ngIf="orden.status === 'CREATED'" 
                  class="btn btn-dark rounded-pill py-2 shadow-sm" 
                  (click)="pagar()" data-bs-dismiss="modal">
            <i class="bi bi-credit-card me-2"></i> Pagar Ahora
          </button>
          
          <div class="d-flex gap-2">
            <button *ngIf="orden.status === 'CREATED'" 
                    class="btn btn-light rounded-pill flex-grow-1 py-2 border shadow-sm">
              <i class="bi bi-pencil me-1"></i> Editar
            </button>
            <button *ngIf="orden.status !== 'CANCELLED'" 
                    class="btn btn-outline-danger rounded-pill flex-grow-1 py-2 shadow-sm"
                    (click)="cancelar()" data-bs-dismiss="modal">
              <i class="bi bi-x-circle me-1"></i> Cancelar
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
